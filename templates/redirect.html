<script>
const patientId = "{{ patient_id }}";

// Step 1: go to DELFI (same tab)
window.location.href = "{{ delfi_url }}";

// Step 2: robust wait system
function waitForDELFIReady() {

    const interval = setInterval(() => {

        const searchBar = document.querySelector("#search_bar");

        const toolsReady =
            window.browser_tools &&
            typeof window.browser_tools.search_from_url === "function";

        const $ready = typeof window.$ !== "undefined";

        if (searchBar && toolsReady && $ready) {

            clearInterval(interval);

            console.log("DELFI ready - injecting patient");

            // Fill search bar
            searchBar.value = patientId;

            // Enable search system safely
            try {
                window.browser_tools.enable_search($("#search_bar"));
            } catch (e) {
                console.warn("enable_search failed", e);
            }

            // Trigger search
            try {
                window.browser_tools.search_from_url();
            } catch (e) {
                console.warn("search_from_url failed", e);
            }
        }

    }, 300);
}

// Wait a bit for app shell to initialize first
setTimeout(waitForDELFIReady, 2500);
</script>
